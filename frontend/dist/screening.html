<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skrining Kesehatan - PrevaLife</title>
  <meta name="description" content="Isi formulir skrining risiko diabetes PrevaLife. Cukup 8 data klinis untuk mendapatkan prediksi berbasis AI.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" crossorigin src="/assets/screening-aZiZcwGn.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/style-Cd3NWkyV.css">
</head>
<body class="font-sans antialiased text-slate-800 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-teal-50 via-cyan-50 to-emerald-50 min-h-screen py-10 px-4 sm:px-6 lg:px-8 flex flex-col items-center justify-center">

  <div class="w-full max-w-2xl glass-panel p-6 sm:p-8 md:p-12 relative overflow-hidden">
    <!-- Decorative blobs -->
    <div class="absolute -top-24 -right-24 w-64 h-64 bg-teal-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse-slow"></div>
    <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-cyan-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse-slow" style="animation-delay: 1.5s;"></div>

    <div class="relative z-10">
      <!-- Header -->
      <div class="text-center mb-8">
        <a href="/" class="inline-flex items-center gap-2 mb-4 text-brand-600 hover:text-brand-700 text-sm font-medium transition-colors">
          <i class="ph ph-arrow-left"></i> Kembali ke Beranda
        </a>
        <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-600 to-cyan-600 mb-2">
          Skrining Risiko Diabetes
        </h1>
        <p class="text-slate-500 text-sm">Isi data klinis Anda untuk mendapatkan prediksi berbasis Deep Learning.</p>
      </div>

      <form id="screening-form" class="space-y-8">

        <!-- ===== SECTION 1: Informasi Diri & Kebiasaan ===== -->
        <div class="bg-white/40 p-5 sm:p-6 rounded-2xl border border-white/50 backdrop-blur-sm space-y-5">
          <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 border-b border-slate-200/60 pb-3">
            <i class="ph-bold ph-identification-card text-brand-600"></i> Informasi Diri & Kebiasaan
          </h2>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- Nama Lengkap -->
            <div class="sm:col-span-2">
              <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="nama">Nama Lengkap</label>
              <div class="relative">
                <input type="text" id="nama" name="nama" class="input-field pl-10" placeholder="Contoh: Budi Santoso" required>
                <i class="ph ph-user absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
              </div>
            </div>

            <!-- Gender -->
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">Jenis Kelamin</label>
              <div class="grid grid-cols-2 gap-3">
                <label class="radio-card py-2.5">
                  <input type="radio" name="gender" value="Female" class="peer sr-only" required>
                  <div class="absolute inset-0 rounded-xl pointer-events-none transition-colors"></div>
                  <div class="flex flex-col items-center gap-1 relative z-10 w-full">
                    <i class="ph ph-gender-female text-xl text-pink-500"></i>
                    <span class="font-semibold text-xs text-slate-700">Wanita</span>
                  </div>
                  <i class="ph-fill ph-check-circle check-icon absolute top-1.5 right-1.5 text-brand-600 text-xs opacity-0 scale-50 transition-all"></i>
                </label>
                <label class="radio-card py-2.5">
                  <input type="radio" name="gender" value="Male" class="peer sr-only">
                  <div class="absolute inset-0 rounded-xl pointer-events-none transition-colors"></div>
                  <div class="flex flex-col items-center gap-1 relative z-10 w-full">
                    <i class="ph ph-gender-male text-xl text-blue-500"></i>
                    <span class="font-semibold text-xs text-slate-700">Pria</span>
                  </div>
                  <i class="ph-fill ph-check-circle check-icon absolute top-1.5 right-1.5 text-brand-600 text-xs opacity-0 scale-50 transition-all"></i>
                </label>
              </div>
            </div>

            <!-- Usia -->
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="age">Usia (tahun)</label>
              <div class="relative">
                <input type="number" id="age" name="age" class="input-field pl-10" placeholder="Contoh: 45" min="1" max="120" required>
                <i class="ph ph-calendar-blank absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
              </div>
            </div>

            <!-- Riwayat Merokok -->
            <div class="sm:col-span-2">
              <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="smoking_history">Riwayat Merokok</label>
              <select id="smoking_history" name="smoking_history" class="input-field" required>
                <option value="" disabled selected>Pilih riwayat merokok Anda...</option>
                <option value="never">Tidak pernah merokok</option>
                <option value="No Info">Tidak ada informasi</option>
                <option value="current">Perokok aktif saat ini</option>
                <option value="former">Mantan perokok</option>
                <option value="ever">Pernah merokok</option>
                <option value="not current">Tidak merokok saat ini</option>
              </select>
            </div>
          </div>
        </div>

        <!-- ===== SECTION 2: Riwayat Medis ===== -->
        <div class="bg-white/40 p-5 sm:p-6 rounded-2xl border border-white/50 backdrop-blur-sm space-y-5">
          <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 border-b border-slate-200/60 pb-3">
            <i class="ph-bold ph-heartbeat text-brand-600"></i> Riwayat Medis
          </h2>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- Hipertensi -->
            <div class="bg-white/30 p-4 rounded-xl border border-slate-200/40">
              <label class="block text-sm font-semibold text-slate-700 mb-3">Hipertensi (Tekanan Darah Tinggi)</label>
              <div class="grid grid-cols-2 gap-3">
                <label class="radio-card py-2"><input type="radio" name="hypertension" value="0" class="peer sr-only" required><div class="absolute inset-0 rounded-xl pointer-events-none transition-colors"></div><div class="flex items-center gap-2 relative z-10 w-full justify-center text-xs font-semibold text-slate-700"><i class="ph ph-x-circle text-slate-400"></i><span>Tidak</span></div><i class="ph-fill ph-check-circle check-icon absolute top-1.5 right-1.5 text-brand-600 text-xs opacity-0 scale-50 transition-all"></i></label>
                <label class="radio-card py-2"><input type="radio" name="hypertension" value="1" class="peer sr-only"><div class="absolute inset-0 rounded-xl pointer-events-none transition-colors"></div><div class="flex items-center gap-2 relative z-10 w-full justify-center text-xs font-semibold text-slate-700"><i class="ph ph-check-circle text-red-500"></i><span>Ya</span></div><i class="ph-fill ph-check-circle check-icon absolute top-1.5 right-1.5 text-brand-600 text-xs opacity-0 scale-50 transition-all"></i></label>
              </div>
            </div>

            <!-- Penyakit Jantung -->
            <div class="bg-white/30 p-4 rounded-xl border border-slate-200/40">
              <label class="block text-sm font-semibold text-slate-700 mb-3">Dianalisis Mengidap Penyakit Jantung</label>
              <div class="grid grid-cols-2 gap-3">
                <label class="radio-card py-2"><input type="radio" name="heart_disease" value="0" class="peer sr-only" required><div class="absolute inset-0 rounded-xl pointer-events-none transition-colors"></div><div class="flex items-center gap-2 relative z-10 w-full justify-center text-xs font-semibold text-slate-700"><i class="ph ph-x-circle text-slate-400"></i><span>Tidak</span></div><i class="ph-fill ph-check-circle check-icon absolute top-1.5 right-1.5 text-brand-600 text-xs opacity-0 scale-50 transition-all"></i></label>
                <label class="radio-card py-2"><input type="radio" name="heart_disease" value="1" class="peer sr-only"><div class="absolute inset-0 rounded-xl pointer-events-none transition-colors"></div><div class="flex items-center gap-2 relative z-10 w-full justify-center text-xs font-semibold text-slate-700"><i class="ph ph-check-circle text-red-500"></i><span>Ya</span></div><i class="ph-fill ph-check-circle check-icon absolute top-1.5 right-1.5 text-brand-600 text-xs opacity-0 scale-50 transition-all"></i></label>
              </div>
            </div>
          </div>
        </div>

        <!-- ===== SECTION 3: Parameter Klinis & Laboratorium ===== -->
        <div class="bg-white/40 p-5 sm:p-6 rounded-2xl border border-white/50 backdrop-blur-sm space-y-5">
          <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 border-b border-slate-200/60 pb-3">
            <i class="ph-bold ph-chart-line-up text-brand-600"></i> Parameter Klinis & Laboratorium
          </h2>

          <div class="space-y-5">
            <!-- BMI Calculator -->
            <div class="bg-white/30 p-4 rounded-xl border border-slate-200/40">
              <label class="block text-sm font-semibold text-slate-700 mb-3"><i class="ph ph-ruler text-brand-600"></i> Hitung BMI (Indeks Massa Tubuh)</label>
              <div class="grid grid-cols-2 gap-4 mb-3">
                <div>
                  <label class="block text-xs font-medium text-slate-500 mb-1" for="height">Tinggi Badan (cm)</label>
                  <input type="number" id="height" class="input-field" placeholder="170" min="50" max="250" required>
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-500 mb-1" for="weight">Berat Badan (kg)</label>
                  <input type="number" id="weight" class="input-field" placeholder="65" min="10" max="300" required>
                </div>
              </div>
              <div class="flex items-center justify-between p-3 bg-teal-50/50 rounded-xl border border-teal-100/50">
                <div>
                  <span class="block text-xs text-slate-500">BMI Anda:</span>
                  <span id="bmi-result" class="text-xl font-bold text-teal-700">0.0</span>
                </div>
                <div id="bmi-category" class="px-3 py-1 rounded-full text-xs font-semibold bg-gray-200 text-gray-700">Belum dihitung</div>
              </div>
              <input type="hidden" name="bmi" id="bmi-hidden">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <!-- HbA1c Level -->
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="HbA1c_level">Kadar HbA1c (%)</label>
                <div class="relative">
                  <input type="number" step="0.1" id="HbA1c_level" name="HbA1c_level" class="input-field pl-10" placeholder="Contoh: 5.5" min="3.0" max="15.0" required>
                  <i class="ph ph-drop-half absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                </div>
              </div>

              <!-- Blood Glucose Level -->
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="blood_glucose_level">Glukosa Darah (mg/dL)</label>
                <div class="relative">
                  <input type="number" id="blood_glucose_level" name="blood_glucose_level" class="input-field pl-10" placeholder="Contoh: 140" min="50" max="500" required>
                  <i class="ph ph-thermometer-hot absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-4 flex justify-center">
          <button type="submit" id="btn-submit" class="w-full sm:w-auto px-10 py-3.5 rounded-xl bg-gradient-to-r from-teal-500 to-cyan-500 text-white font-bold hover:from-teal-600 hover:to-cyan-600 shadow-md hover:shadow-lg transition-all focus:ring-2 focus:ring-teal-500 ring-offset-2 outline-none flex items-center justify-center gap-2 active:scale-98">
            Analisis Kesehatan <i class="ph-bold ph-brain text-lg"></i>
          </button>
        </div>

      </form>
    </div>
  </div>

  <p class="mt-6 text-center text-xs text-slate-400 max-w-sm">
    <i class="ph ph-shield-check text-brand-400"></i>
    Data Anda diproses secara aman dan tidak disimpan secara publik.
  </p>

</body>
</html>
