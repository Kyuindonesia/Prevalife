<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - PrevaLife</title>
  <link rel="icon" type="image/png" href="/images/icon.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="./src/css/style.css" />
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    .glass-input:focus-within {
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.15);
    }
  </style>
</head>
<body class="bg-[#f3f4f6] min-h-screen flex items-center justify-center font-outfit p-4 sm:p-8 relative overflow-hidden text-gray-800">

  <!-- Ambient Background Blobs -->
  <div class="fixed top-[-10%] left-[-5%] w-[40vw] h-[40vw] bg-teal-200/40 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse"></div>
  <div class="fixed bottom-[-10%] right-[-5%] w-[40vw] h-[40vw] bg-brand-200/40 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse" style="animation-delay: 2s;"></div>

  <div class="w-full max-w-5xl bg-white/80 backdrop-blur-xl border border-white/60 rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row relative z-10 slide-up">
    
    <!-- Left Side: Branding / Visual Panel -->
    <div class="md:w-[45%] bg-gradient-to-br from-brand-600 to-brand-800 p-10 flex flex-col justify-between relative overflow-hidden text-white min-h-[300px] md:min-h-0">
      
      <!-- Decorative circles -->
      <div class="absolute top-[-20%] left-[-20%] w-64 h-64 bg-white/10 rounded-full blur-2xl"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-48 h-48 bg-teal-400/20 rounded-full blur-xl"></div>
      
      <div class="relative z-10">
        <div class="flex items-center gap-2 mb-8">
          <img src="/images/icon.png" alt="PrevaLife Logo" class="w-10 h-10 object-contain drop-shadow-md">
          <span class="text-xl font-bold tracking-wide">PrevaLife</span>
        </div>
        
        <h2 class="text-3xl md:text-4xl font-bold leading-tight mb-4">Akses Portal <br/><span class="text-teal-200">Administrator</span></h2>
        <p class="text-brand-100 text-sm md:text-base opacity-90 leading-relaxed max-w-xs">
          Kelola data skrining pasien dan pantau analitik kesehatan dengan aman dan mudah.
        </p>
      </div>

      <div class="relative z-10 mt-12 md:mt-0">
        <div class="flex items-center gap-3">
          <div class="flex -space-x-3">
            <div class="w-8 h-8 rounded-full bg-teal-300 border-2 border-brand-700 flex items-center justify-center"><i class="ph-fill ph-check-circle text-brand-700"></i></div>
            <div class="w-8 h-8 rounded-full bg-teal-200 border-2 border-brand-700 flex items-center justify-center"><i class="ph-fill ph-lock-key text-brand-700"></i></div>
            <div class="w-8 h-8 rounded-full bg-teal-100 border-2 border-brand-700 flex items-center justify-center"><i class="ph-fill ph-shield text-brand-700"></i></div>
          </div>
          <span class="text-xs font-medium text-teal-100">Sistem Keamanan Tinggi</span>
        </div>
      </div>
    </div>

    <!-- Right Side: Form Panel -->
    <div class="md:w-[55%] p-8 md:p-14 lg:p-16 flex flex-col justify-center bg-white relative">
      
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight mb-2">Selamat Datang 👋</h1>
        <p class="text-gray-500">Silakan masukkan kredensial Anda untuk melanjutkan.</p>
      </div>

      <form id="admin-login-form" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
          <div class="relative glass-input transition-all rounded-xl">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="ph ph-user text-gray-400 text-xl"></i>
            </div>
            <input type="text" id="username" name="username" class="w-full pl-11 pr-4 py-3.5 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-0 focus:border-brand-500 focus:bg-white transition-all outline-none text-gray-800 placeholder-gray-400" placeholder="Masukkan username admin" required>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
          <div class="relative glass-input transition-all rounded-xl">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="ph ph-lock-key text-gray-400 text-xl"></i>
            </div>
            <input type="password" id="password" name="password" class="w-full pl-11 pr-4 py-3.5 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-0 focus:border-brand-500 focus:bg-white transition-all outline-none text-gray-800 placeholder-gray-400" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" id="btn-login" class="w-full py-3.5 px-4 mt-2 bg-gray-900 hover:bg-brand-600 text-white font-semibold rounded-xl shadow-[0_4px_14px_0_rgba(0,0,0,0.1)] hover:shadow-[0_6px_20px_rgba(13,148,136,0.23)] hover:-translate-y-0.5 transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2 group">
          <span>Masuk ke Dashboard</span>
          <i class="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform"></i>
        </button>
      </form>
      
      <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <a href="/" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-brand-600 font-medium transition-colors">
          <i class="ph-bold ph-caret-left"></i>
          Kembali ke Beranda
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="./src/js/preva.js"></script>
</body>
</html>
